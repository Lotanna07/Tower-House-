<!DOCTYPE html>
   <html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">

      <!--=============== FAVICON ===============-->
      <link rel="shortcut icon" href="assets/img/favicon.png" type="image/x-icon">

      <!--=============== REMIXICONS ===============-->
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.css">

      <!--=============== SAKURA CSS ===============-->
      <link rel="stylesheet" href="assets/css/sakura.min.css">

      <!--=============== CSS ===============-->
      <link rel="stylesheet" href="assets/css/styles.css">

      <title>Responsive temple website - Bedimcode</title>
   </head>
   <body>
      <!--==================== HEADER ====================-->
      <header class="header" id="header">
         <nav class="nav container">
            <a href="#" class="nav--logo">
            <i class="ri-ancient-gate-line"></i>
            <span>Temple</span>
            </a>
            <div class="nav--menu" id="nav-menu">
               <ul class="nav--list">
                  <li>
                     <a href="#" class="nav--link">Home</a>
                  </li>

                  <li>
                     <a href="#" class="nav--link">Location</a>
                  </li>

                  <li>
                     <a href="#" class="nav--link">About</a>
                  </li>

                  <li>
                     <a href="#" class="nav--link">Explore</a>
                  </li>

                  <li>
                     <a href="#" class="nav--link">Contact</a>
                  </li>

               </ul>
               <!--close button-->
               <div class="nav--close" id="nav-close">
                  <i class="ri-close-large-line"></i>
               </div>
            </div>
            <!--toggle button-->
            <div class="nav--toggle" id="nav-toggle">
               <i class="ri-apps-line"></i>
            </div>
         </nav>

      </header>

      <!--==================== MAIN ====================-->
      <main class="main">
         <!--==================== HOME ====================-->
         <section class="home">
            <img src="assets/img/img-bg.svg" alt="image" class="home--bg">

            <div class="home--container container">
               <div class="home--data">
               <h1 class="home--title">Welcome To <br> Temple</h1>
               <P class="home--description">
                  The temple is an attractive tourist place 
                  where you could visit and connect to the 
                  pure land of the environment, you will 
                  experience peace and harmony.
               </P>
               <a href="#" class="home--button">Explore Place</a>
               <img src="assets/img/lantern-1.svg" alt="image" class="home--lantern-1">
               <img src="assets/img/lantern-2.svg" alt="image" class="home--lantern-2">
               </div>
               <div class="home--images">
                  <img src="assets/img/img-1.svg" alt="image" class="home--img-1">
                  <img src="assets/img/img-2.svg" alt="image" class="home--img-2">
                  <img src="assets/img/img-3.svg" alt="image" class="home--img-3">
                  <img src="assets/img/img-4.svg" alt="image" class="home--img-4">
                  <img src="assets/img/img-5.svg" alt="image" class="home--img-5">
                  <img src="assets/img/img-6.svg" alt="image" class="home--img-6">

               </div>
            </div>
         </section>
      </main>

      <!-- Sakura petals -->
      <div class="sakura-petals"></div>
      
      <!--=============== GSAP ===============-->
      <script src="assets/js/gsap.min.js"></script>

      <!--=============== SAKURA JS ===============-->
      <script src="assets/js/sakura.min.js"></script>
      
      <!--=============== MAIN JS ===============-->
      <script src="assets/js/main.js"></script>
   </body>
</html>
